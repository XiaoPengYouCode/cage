[project]
name = "topopt-backfill"
version = "0.1.0"
description = "Topology-optimization density to seed sampling and Voronoi template backfill workflows"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "numpy>=2.3.3",
    "scipy>=1.17.1",
    "helix-voronoi",
]

[project.scripts]
topopt-backfill = "topopt_backfill.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/topopt_backfill"]
