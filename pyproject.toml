[project]
name = "cage"
version = "0.1.0"
description = "Voronoi cell visualization and rod-style geometry experiments"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "matplotlib>=3.10.8",
    "scipy>=1.17.1",
]

[project.scripts]
cage = "cage.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.uv]
package = true
